{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<div class="row justify-content-center align-items-center">

    <div class="col-md-6 col-lg-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <h2 class="fw-bold">
                        Welcome Back
                    </h2>

                    <p class="text-muted">
                        Login to continue
                    </p>

                </div>

                <form method="POST">

                    {% csrf_token %}

                    <!-- Username -->
                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            placeholder="Enter username"
                        >

                    </div>

                    <!-- Password -->
                    <div class="mb-4">

                        <label class="form-label">
                            Password
                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            placeholder="Enter password"
                        >

                    </div>

                    <button type="submit" class="btn btn-dark w-100 py-2">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
