{% extends 'base.html' %}

{% block title %}
Register
{% endblock %}

{% block content %}

<div class="row justify-content-center align-items-center">

    <div class="col-md-6 col-lg-5">

        <div class="card shadow-lg border-0 rounded-4">

            <div class="card-body p-5">

                <div class="text-center mb-4">

                    <h2 class="fw-bold">
                        Create Account
                    </h2>

                    <p class="text-muted">
                        Join the Job Portal platform
                    </p>

                </div>

                <form method="POST">

                    {% csrf_token %}

                    <!-- Username -->
                    <div class="mb-3">

                        <label class="form-label">
                            Username
                        </label>

                        {{ form.username }}

                    </div>

                    <!-- Email -->
                    <div class="mb-3">

                        <label class="form-label">
                            Email
                        </label>

                        {{ form.email }}

                    </div>
                    
                    <!-- Role -->
                     <div class="mb-3">

                    <label class="form-label">
                        Select Role
                        </label>

                        {{ form.role }}

                    </div>


                    <!-- Password -->
                    <div class="mb-3">

                        <label class="form-label">
                            Password
                        </label>

                        {{ form.password1 }}

                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-4">

                        <label class="form-label">
                            Confirm Password
                        </label>

                        {{ form.password2 }}

                    </div>

                    <button type="submit" class="btn btn-primary w-100 py-2">

                        Register

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
