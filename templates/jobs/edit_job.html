{% extends 'base.html' %}

{% block title %}
Edit Job
{% endblock %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card border-0 shadow-sm rounded-4">

                <div class="card-body p-5">

                    <div class="text-center mb-5">

                        <h1 class="fw-bold">
                            Edit Job
                        </h1>

                        <p class="text-muted">
                            Update job information
                        </p>

                    </div>

                    <form method="POST">

                        {% csrf_token %}

                        {{ form.as_p }}

                        <button
                            type="submit"
                            class="btn btn-dark btn-lg w-100 mt-3">

                            Update Job

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
